    function ExerciseLogScreen({ rutinaId, sesionN, exIdx, client, data, setData, pop }) {
      const routine = data.routines.find(r => r.id === rutinaId);
      const sesion = routine?.sessions.find(s => s.number === sesionN);
      const ex = sesion?.exercises[exIdx];
      if (!ex) return null;

      const logsKey = `${rutinaId}__${ex.name}`;
      const allLogs = (client.exerciseLogs && client.exerciseLogs[logsKey]) || [];
      const lastLog = allLogs[allLogs.length - 1];

      const [sets, setSets] = useState(() => {
        const baseCount = Math.max(Number(ex.sets) || 1, 1);
        if (lastLog) {
          const arr = Array.from({length: baseCount}, (_, i) => lastLog.sets[i] || { weight: '', reps: '' });
          return arr.map(s => ({ weight: s.weight || '', reps: s.reps || '' }));
        }
        return Array.from({length: baseCount}, () => ({ weight: '', reps: '' }));
      });

      const updSet = (i, field, val) => setSets(s => s.map((row, j) => j === i ? { ...row, [field]: val } : row));
      const addSet = () => setSets(s => [...s, { weight: '', reps: '' }]);
      const removeSet = (i) => setSets(s => s.filter((_, j) => j !== i));

      const save = () => {
        const filled = sets.filter(s => s.weight !== '' || s.reps !== '');
        if (filled.length === 0) return alert('Cargá al menos una serie con peso o repeticiones.');
        const log = {
          date: todayISO(), sessionN,
          sets: sets.map(s => ({ weight: Number(s.weight) || 0, reps: Number(s.reps) || 0 })),
        };
        const newLogs = { ...(client.exerciseLogs || {}), [logsKey]: [...allLogs, log] };
        const newClients = data.clients.map(c => c.id === client.id ? { ...c, exerciseLogs: newLogs } : c);
        setData({ ...data, clients: newClients });
        alert('Registro guardado ✓');
        pop();
      };

      const sortedLogs = [...allLogs].sort((a,b) => b.date.localeCompare(a.date));
      const maxEver = allLogs.length ? Math.max(...allLogs.flatMap(l => l.sets.map(s => s.weight))) : 0;

      return (
        <div className="min-h-screen bg-neutral-50 pb-28">
          <Header title="Registrar serie" onBack={pop} />

          <div className="p-4 space-y-4 fade-in">
            <Card>
              <p className="text-neutral-500 text-xs">Ejercicio</p>
              <h2 className="text-neutral-900 font-bold text-xl mt-0.5">{ex.name}</h2>
              <p className="text-neutral-500 text-xs mt-2">Plan del día: <span className="font-semibold text-neutral-700">{ex.sets} series x {ex.reps}</span></p>
              {maxEver > 0 && (
                <p className="text-green-600 text-xs mt-1">🏆 Récord personal: {maxEver} kg</p>
              )}
            </Card>

            <Card>
              <div className="flex items-center justify-between mb-3">
                <p className="text-neutral-500 text-xs font-semibold uppercase">Lo que hiciste hoy</p>
                <button onClick={addSet} className="text-green-600 text-xs font-semibold flex items-center gap-1">
                  <Ic name="plus" className="w-3.5 h-3.5" /> Agregar serie
                </button>
              </div>

              <div className="grid grid-cols-12 gap-2 text-[10px] text-neutral-500 font-semibold uppercase mb-1 px-1">
                <span className="col-span-2">Serie</span>
                <span className="col-span-4">Peso (kg)</span>
                <span className="col-span-4">Reps</span>
                <span className="col-span-2"></span>
              </div>

              <div className="space-y-2">
                {sets.map((s, i) => (
                  <div key={i} className="grid grid-cols-12 gap-2 items-center">
                    <span className="col-span-2 text-neutral-700 font-bold text-sm">#{i+1}</span>
                    <input type="number" inputMode="decimal" step="0.5" placeholder="0" value={s.weight}
                      onChange={e => updSet(i, 'weight', e.target.value)}
                      className="col-span-4 bg-white border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:border-green-600 outline-none" />
                    <input type="number" inputMode="numeric" placeholder="0" value={s.reps}
                      onChange={e => updSet(i, 'reps', e.target.value)}
                      className="col-span-4 bg-white border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:border-green-600 outline-none" />
                    <button onClick={() => removeSet(i)} disabled={sets.length <= 1}
                      className="col-span-2 p-1.5 text-red-500 disabled:opacity-30">
                      <Ic name="trash" className="w-4 h-4 mx-auto" />
                    </button>
                  </div>
                ))}
              </div>
            </Card>

            <div>
              <div className="flex items-center justify-between mb-2 px-1">
                <p className="text-neutral-500 text-xs font-semibold uppercase">Historial de progresión</p>
                <span className="text-neutral-400 text-xs">{allLogs.length} registro{allLogs.length !== 1 ? 's' : ''}</span>
              </div>
              {sortedLogs.length === 0 ? (
                <Card><p className="text-neutral-500 text-sm text-center py-4">Todavía no registraste este ejercicio. Tu primer registro va a marcar la línea base.</p></Card>
              ) : (
                <div className="space-y-2">
                  {sortedLogs.map((log, i) => {
                    const maxW = Math.max(...log.sets.map(s => s.weight));
                    const totalReps = log.sets.reduce((a, s) => a + s.reps, 0);
                    const volumen = log.sets.reduce((a, s) => a + s.weight * s.reps, 0);
                    const prevLog = sortedLogs[i + 1];
                    const prevMax = prevLog ? Math.max(...prevLog.sets.map(s => s.weight)) : null;
                    const diff = prevMax !== null ? maxW - prevMax : null;
                    return (
                      <Card key={i} className="!py-3">
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <p className="text-neutral-900 font-semibold text-sm">{fmtDateLong(log.date)}</p>
                            <p className="text-neutral-500 text-xs">Sesión {log.sessionN}</p>
                          </div>
                          <div className="text-right">
                            <div className="flex items-center gap-1 justify-end">
                              <p className="text-green-600 font-bold">{maxW} kg</p>
                              {diff !== null && diff !== 0 && (
                                <span className={`text-[10px] font-bold ${diff > 0 ? 'text-green-600' : 'text-red-500'}`}>
                                  {diff > 0 ? '↑' : '↓'} {Math.abs(diff)}
                                </span>
                              )}
                            </div>
                            <p className="text-neutral-400 text-[10px]">{totalReps} reps · {volumen}kg vol.</p>
                          </div>
                        </div>
                        <div className="flex gap-1.5 flex-wrap">
                          {log.sets.map((s, j) => (
                            <span key={j} className="text-[11px] bg-neutral-100 text-neutral-700 px-2 py-0.5 rounded font-medium">
                              S{j+1}: <span className="text-neutral-900">{s.weight}kg × {s.reps}</span>
                            </span>
                          ))}
                        </div>
                      </Card>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-neutral-200 p-4 safe-bottom">
            <Button onClick={save} className="w-full">Guardar registro</Button>
          </div>
        </div>
      );
    }

    function MiActividadScreen({ client, data, pop }) {
      const [tab, setTab] = useState('mes');
      const [cur, setCur] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
      const [selected, setSelected] = useState(todayISO());
      const myActs = (data.activities || []).filter(a => a.clientId === client.id);
      const days = (() => {
        const first = new Date(cur.y, cur.m, 1);
        const last = new Date(cur.y, cur.m + 1, 0);
        const startDow = (first.getDay() + 6) % 7; // lunes = 0
        const result = [];
        for (let i = 0; i < startDow; i++) result.push(null);
        for (let d = 1; d <= last.getDate(); d++) result.push(d);
        return result;
      })();
      const dayHasActivity = (d) => {
        if (!d) return false;
        const iso = `${cur.y}-${String(cur.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        return myActs.some(a => a.date === iso);
      };
      const isSelected = (d) => {
        if (!d) return false;
        const iso = `${cur.y}-${String(cur.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        return selected === iso;
      };
      const selectDay = (d) => {
        if (!d) return;
        const iso = `${cur.y}-${String(cur.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        setSelected(iso);
      };
      const selectedActs = myActs.filter(a => a.date === selected);
      const prevMonth = () => setCur(c => c.m === 0 ? { y: c.y-1, m: 11 } : { y: c.y, m: c.m-1 });
      const nextMonth = () => setCur(c => c.m === 11 ? { y: c.y+1, m: 0 } : { y: c.y, m: c.m+1 });

      return (
        <div className="min-h-screen bg-neutral-50">
          <Header title="Mi actividad" onBack={pop} right={<button className="p-2 rounded-full text-green-600 border-2 border-green-600"><Ic name="plus" className="w-4 h-4" /></button>} />

          <div className="bg-white">
            <div className="flex border-b border-neutral-200">
              <button onClick={() => setTab('mes')} className={`flex-1 py-3 font-semibold text-sm ${tab==='mes' ? 'text-green-600 border-b-2 border-green-600' : 'text-neutral-500'}`}>Mensual</button>
              <button onClick={() => setTab('historial')} className={`flex-1 py-3 font-semibold text-sm ${tab==='historial' ? 'text-green-600 border-b-2 border-green-600' : 'text-neutral-500'}`}>Historial</button>
            </div>
          </div>

          <div className="p-4 fade-in">
            {tab === 'mes' ? (
              <>
                <Card>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="text-neutral-900 font-bold text-lg">{monthName(cur.m)} {cur.y}</h3>
                    <div className="flex gap-1">
                      <button onClick={prevMonth} className="p-1.5 text-green-600"><Ic name="chevronLeft" className="w-5 h-5" /></button>
                      <button onClick={nextMonth} className="p-1.5 text-green-600"><Ic name="chevronRight" className="w-5 h-5" /></button>
                    </div>
                  </div>
                  <div className="grid grid-cols-7 text-center text-xs text-neutral-500 font-medium mb-2">
                    {['lun','mar','mié','jue','vie','sáb','dom'].map(d => <div key={d}>{d}</div>)}
                  </div>
                  <div className="grid grid-cols-7 gap-1.5">
                    {days.map((d, i) => (
                      <button key={i} onClick={() => selectDay(d)} disabled={!d}
                        className={`aspect-square rounded-full flex items-center justify-center text-sm font-medium ${
                          !d ? '' :
                          isSelected(d) ? 'bg-neutral-700 text-white' :
                          dayHasActivity(d) ? 'bg-green-500 text-white' :
                          'text-neutral-700 hover:bg-neutral-100'
                        }`}>
                        {d || ''}
                      </button>
                    ))}
                  </div>
                  <div className="flex items-center gap-4 mt-4 text-xs text-neutral-600">
                    <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-green-500" /> Con actividad</span>
                    <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-neutral-700" /> Seleccionada</span>
                  </div>
                </Card>

                <div className="mt-4">
                  <p className="text-neutral-900 font-bold text-lg">{fmtDateLong(selected)}</p>
                  {selectedActs.length === 0 ? (
                    <p className="text-neutral-500 text-sm mt-1">No hay actividades registradas para este día</p>
                  ) : (
                    <div className="mt-2 space-y-2">
                      {selectedActs.map(a => (
                        <Card key={a.id} className="!py-3 flex items-center justify-between">
                          <div>
                            <p className="text-neutral-900 font-semibold">Sesión {a.sessionN} completada</p>

                      ))}
                    </div>
                  )}
                </div>
              </>
            ) : (
              <div className="space-y-2">
                {myActs.length === 0 ? <p className="text-neutral-500 text-center py-8">Sin historial todavía</p> :
                 myActs.sort((a,b) => b.date.localeCompare(a.date)).map(a => (

                      <p className="text-neutral-900 font-semibold">Sesión {a.sessionN}</p>

        </div>

    function ClientApp({ client, data, setData, onLogout }) {
      const [tab, setTab] = useState('home');
      const [stack, setStack] = useState([]);
      const [showMas, setShowMas] = useState(false);

      const push = (screen) => setStack(s => [...s, screen]);
      const pop = () => setStack(s => s.slice(0, -1));
      const current = stack[stack.length - 1];

      if (current) {
        const props = { client, data, setData, pop, push };
        switch (current.type) {
          case 'notificaciones': return <NotificacionesScreen {...props} />;
          case 'cartera': return <CarteraScreen {...props} />;
          case 'reservas': return <ReservasScreen {...props} />;
          case 'catalogo': return <CatalogoScreen {...props} />;
          case 'category': return <CategoryScreen categoryId={current.id} {...props} />;
          case 'misEntrenamientos': return <MisEntrenamientosScreen {...props} />;
          case 'miActividad': return <MiActividadScreen {...props} />;
          case 'historicoPesajes': return <HistoricoPesajesScreen {...props} />;
          case 'seguimiento': return <SeguimientoScreen {...props} />;
          case 'qr': return <QrScreen {...props} />;
          case 'rutina': return <RutinaDetailScreen rutinaId={current.id} {...props} />;
          case 'sesion': return <SesionDetailScreen rutinaId={current.rutinaId} sesionN={current.sesionN} {...props} />;
          case 'ejercicio': return <ExerciseDetailScreen rutinaId={current.rutinaId} sesionN={current.sesionN} exIdx={current.exIdx} {...props} />;
          case 'logEjercicio': return <ExerciseLogScreen rutinaId={current.rutinaId} sesionN={current.sesionN} exIdx={current.exIdx} {...props} />;
          case 'personalTrainer': return <PersonalTrainerListScreen {...props} />;
          case 'trainerDetail': return <TrainerDetailScreen trainerId={current.id} {...props} />;
          case 'perfil': return <div className="min-h-screen bg-neutral-50 pb-24"><Header title="Mi perfil" onBack={pop} /><MiPerfil {...props} onLogout={onLogout} /></div>;
        }
      }

      const tabs = [
        { id: 'home', label: 'Hoy tienes', icon: 'home' },
        { id: 'centro', label: 'Mi centro', icon: 'building' },
        { id: 'perfil', label: 'Mi perfil', icon: 'user' },
        { id: 'mas', label: 'Más', icon: 'gridPlus' },
      ];

      const handleTab = (id) => {
        if (id === 'mas') setShowMas(true);
        else setTab(id);
      };

      return (
        <div className="min-h-screen bg-neutral-50">
          <main className="pb-24">
            {tab === 'home' && <HoyTienes client={client} data={data} push={push} />}
            {tab === 'centro' && <MiCentro client={client} data={data} push={push} />}
            {tab === 'perfil' && <MiPerfil client={client} data={data} setData={setData} onLogout={onLogout} push={push} />}
          </main>
          <TabBar tabs={tabs} active={tab} onChange={handleTab} />
          {showMas && <MasSheet onClose={() => setShowMas(false)} push={push} />}
        </div>
      );
    }

            <Select label="Cliente" value={form.clientId} onChange={e => {

              <option value="">— Seleccionar —</option>

           (data.trainers || []).map(t => {

      const [form, setForm] = useState(empty);
      useEffect(() => { setForm(trainer || empty); }, [trainer, open]);
      const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const submit = () => {
        if (!form.name.trim() || !form.username.trim() || !form.password.trim()) return alert('Nombre, usuario y contraseña son obligatorios');
        if (!form.accessKey) upd('accessKey', form.username.toUpperCase() + '-2026');

        onClose();
      };
      return (
        <Modal open={open} onClose={onClose} title={trainer ? 'Editar PT' : 'Nuevo Personal Trainer'}>

    function TrainerAlumnos({ trainer, data, setData }) {
      const myClients = data.clients.filter(c => (c.trainerAccess || []).includes(trainer.id));
      const [editing, setEditing] = useState(null);
      const grantAccess = () => {
        const dni = prompt('DNI del cliente a darle acceso:');
        if (!dni) return;
        const c = data.clients.find(c => c.dni === dni.trim());
        if (!c) return alert('No existe cliente con ese DNI');
        if ((c.trainerAccess || []).includes(trainer.id)) return alert('Ese cliente ya tiene acceso');
        const newClients = data.clients.map(x => x.id === c.id ? { ...x, trainerAccess: [...(x.trainerAccess || []), trainer.id] } : x);
        setData({ ...data, clients: newClients });
        alert(`Acceso otorgado a ${c.name}`);
      };
      const revokeAccess = (cId) => {
        if (!confirm('¿Quitar acceso a este alumno?')) return;
        const newClients = data.clients.map(x => x.id === cId ? { ...x, trainerAccess: (x.trainerAccess || []).filter(t => t !== trainer.id) } : x);
        const newTrainers = data.trainers.map(t => {
          if (t.id !== trainer.id) return t;
          const { [cId]: _, ...rest } = t.assignments || {};
          return { ...t, assignments: rest };
        });
        setData({ ...data, clients: newClients, trainers: newTrainers });
      };
      const saveAssignment = (cId, form) => {
        const newTrainers = data.trainers.map(t => t.id === trainer.id ? { ...t, assignments: { ...t.assignments, [cId]: form } } : t);
        setData({ ...data, trainers: newTrainers });
        setEditing(null);
      };

      return (
        <div className="p-4 space-y-3 fade-in">
          <Button onClick={grantAccess} className="w-full flex items-center justify-center gap-2"><Ic name="plus" className="w-5 h-5" /> Dar acceso a un cliente</Button>
          {myClients.length === 0 ? (
            <Card><p className="text-neutral-500 text-center py-6 text-sm">Todavía no tenés alumnos. Dales acceso con tu clave: <span className="font-mono font-bold text-green-600">{trainer.accessKey}</span></p></Card>
          ) : myClients.map(c => {
            const assignment = trainer.assignments?.[c.id] || {};
            const routine = trainer.routines.find(r => r.id === assignment.routineId);
            const plan = trainer.nutritionPlans.find(p => p.id === assignment.nutritionPlanId);
            return (
              <Card key={c.id} className="!p-0 overflow-hidden">
                <div className="p-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="w-11 h-11 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold">{c.name.charAt(0)}</div>
                      <div>
                        <p className="text-neutral-900 font-semibold">{c.name}</p>
                        <p className="text-neutral-500 text-xs">DNI {c.dni}</p>
                      </div>
                    </div>
                    <button onClick={() => revokeAccess(c.id)} className="text-red-500 p-2"><Ic name="x" className="w-4 h-4" /></button>
                  </div>
                  <div className="mt-3 text-xs space-y-1 text-neutral-600">
                    <p>📋 Rutina asignada: <span className="text-neutral-900 font-medium">{routine?.name || 'Sin asignar'}</span></p>
                    <p>🥗 Plan de nutrición: <span className="text-neutral-900 font-medium">{plan?.name || 'Sin asignar'}</span></p>
                    {assignment.notes && <p className="text-green-700">📝 {assignment.notes}</p>}
                  </div>
                  <button onClick={() => setEditing(c.id)} className="mt-3 text-green-600 text-xs font-semibold">Editar asignación →</button>
                </div>
                {editing === c.id && (
                  <div className="bg-neutral-50 p-4 border-t border-neutral-200 space-y-3">
                    <Select label="Rutina" value={assignment.routineId || ''} onChange={e => saveAssignment(c.id, { ...assignment, routineId: e.target.value })}>
                      <option value="">— Sin asignar —</option>
                      {trainer.routines.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                    </Select>
                    <Select label="Plan de nutrición" value={assignment.nutritionPlanId || ''} onChange={e => saveAssignment(c.id, { ...assignment, nutritionPlanId: e.target.value })}>
                      <option value="">— Sin asignar —</option>
                      {trainer.nutritionPlans.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                    </Select>
                    <Input label="Notas privadas" value={assignment.notes || ''} onChange={e => saveAssignment(c.id, { ...assignment, notes: e.target.value })} />
                    <button onClick={() => setEditing(null)} className="text-neutral-600 text-xs">Cerrar</button>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      );
    }

                     <button onClick={() => delPayment(p.id)} className="text-red-400"><Ic name="trash" className="w-4 h-4" /></button>
                   </div>

               );
             })}
          </div>
          <PaymentFormModal open={showForm} onClose={() => setShowForm(false)} onSave={addPayment} clients={myClients} preselectedClientId={null} />
        </div>
      );

            <p className="text-neutral-500 text-xs font-semibold uppercase mb-3">Cuenta</p>
            <div className="space-y-3">
              <Input label="Usuario" value={form.username} onChange={e => upd('username', e.target.value)} />
              <Input label="Contraseña" type="password" value={form.password} onChange={e => upd('password', e.target.value)} />
            </div>
          </Card>
          <Button onClick={save} className="w-full">Guardar cambios</Button>
          <Button onClick={onLogout} variant="danger" className="w-full flex items-center justify-center gap-2"><Ic name="logout" className="w-4 h-4" /> Cerrar sesión</Button>
        </div>
      );
    }

    function TrainerApp({ trainer, data, setData, onLogout }) {
      const [tab, setTab] = useState('home');
      const tabs = [
        { id: 'home', label: 'Inicio', icon: 'chart' },
        { id: 'alumnos', label: 'Alumnos', icon: 'users' },
        { id: 'cobros', label: 'Cobros', icon: 'wallet' },
        { id: 'rutinas', label: 'Rutinas', icon: 'dumbbell' },
        { id: 'nutricion', label: 'Nutrición', icon: 'fire' },
      ];
      const titles = { home: 'Panel del PT', alumnos: 'Mis alumnos', cobros: 'Mis cobros', rutinas: 'Mis rutinas', nutricion: 'Nutrición', ajustes: 'Ajustes' };
      return (
        <div className="min-h-screen bg-neutral-50">
          <Header title={titles[tab]} right={
            <button onClick={() => setTab('ajustes')} className="p-2 -mr-2"><Ic name="gear" className="w-5 h-5 text-neutral-700" /></button>
          } />
          <main className="pb-24">
            {tab === 'home' && <TrainerHome trainer={trainer} data={data} />}
            {tab === 'alumnos' && <TrainerAlumnos trainer={trainer} data={data} setData={setData} />}
            {tab === 'cobros' && <TrainerCobros trainer={trainer} data={data} setData={setData} />}
            {tab === 'rutinas' && <TrainerRutinas trainer={trainer} data={data} setData={setData} />}
            {tab === 'nutricion' && <TrainerNutricion trainer={trainer} data={data} setData={setData} />}
            {tab === 'ajustes' && <TrainerAjustes trainer={trainer} data={data} setData={setData} onLogout={onLogout} />}
          </main>
          <TabBar tabs={tabs} active={tab} onChange={setTab} />
        </div>
      );
    }

    // ===================== ROOT =====================
    function App() {
      const [data, setDataState] = useState(loadData);
      const [user, setUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem('tv_user')); } catch { return null; } });
      const setData = (d) => { setDataState(d); saveData(d); };
      const login = (u) => { setUser(u); sessionStorage.setItem('tv_user', JSON.stringify(u)); };
      const logout = () => { setUser(null); sessionStorage.removeItem('tv_user'); };

      if (!user) return <Login data={data} onLogin={login} />;
      if (user.type === 'admin') return <AdminApp data={data} setData={setData} onLogout={logout} />;
      if (user.type === 'trainer') {
        const trainer = (data.trainers || []).find(t => t.id === user.id);
        if (!trainer) { logout(); return null; }
        return <TrainerApp trainer={trainer} data={data} setData={setData} onLogout={logout} />;
      }
      const client = data.clients.find(c => c.id === user.id);
      if (!client) { logout(); return null; }
      return <ClientApp client={client} data={data} setData={setData} onLogout={logout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
